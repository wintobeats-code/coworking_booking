services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coworking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coworking123}
      POSTGRES_DB: ${POSTGRES_DB:-coworking}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coworking}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-coworking}:${POSTGRES_PASSWORD:-coworking123}@db:5432/${POSTGRES_DB:-coworking}
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-prod}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
